<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BerryBlue — Jay-chan & Friends</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: #0f0520;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .chat-wrapper {
      width: 100%;
      max-width: 480px;
      background: linear-gradient(160deg, #1a0a2e 0%, #2d1060 60%, #1a0a2e 100%);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 24px 80px rgba(124, 58, 237, 0.35), 0 0 0 1px rgba(192,132,252,0.15);
      display: flex;
      flex-direction: column;
      height: 90vh;
      max-height: 700px;
    }

    /* ── Sprite area ── */
    .sprite-area {
      flex-shrink: 0;
      height: 180px;
      background: #f5efe6;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      transition: background 0.3s ease;
    }
    .sprite-area img {
      max-height: 100%;
      max-width: 100%;
      object-fit: contain;
      transition: opacity 0.15s ease, filter 0.3s ease;
    }
    .sprite-area img.loading {
      filter: blur(4px) brightness(0.7);
    }
    .sprite-loader {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      z-index: 10;
    }
    .sprite-loader.visible { display: flex; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(192,132,252,0.3);
      border-top-color: #c084fc;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-text {
      color: #e9d5ff;
      font-size: 12px;
      font-weight: 700;
      text-shadow: 0 1px 4px rgba(0,0,0,0.5);
      white-space: nowrap;
    }
    .sprite-area img.shaking {
      animation: shake 0.4s ease-in-out infinite;
    }
    @keyframes shake {
      0%   { transform: translate(0, 0) rotate(0deg); }
      15%  { transform: translate(-4px, -2px) rotate(-2deg); }
      30%  { transform: translate(4px, 2px) rotate(2deg); }
      45%  { transform: translate(-3px, 1px) rotate(-1deg); }
      60%  { transform: translate(3px, -1px) rotate(1deg); }
      75%  { transform: translate(-2px, 2px) rotate(-1deg); }
      90%  { transform: translate(2px, -2px) rotate(1deg); }
      100% { transform: translate(0, 0) rotate(0deg); }
    }
    .sprite-placeholder {
      font-size: 64px;
      transition: transform 0.2s ease, filter 0.2s ease;
    }
    .sprite-placeholder.emotion-panicking { transform: scale(1.15) rotate(-3deg); filter: drop-shadow(0 0 16px rgba(248,113,113,0.5)); }
    .sprite-placeholder.emotion-quietly { transform: scale(0.9); filter: drop-shadow(0 0 10px rgba(167,139,250,0.4)) brightness(0.85); }
    .sprite-placeholder.emotion-deadpan { transform: scale(1); filter: grayscale(0.3); }
    .sprite-placeholder.emotion-screams { transform: scale(1.25); filter: drop-shadow(0 0 20px rgba(248,113,113,0.7)); }
    .sprite-placeholder.emotion-sighs { transform: scale(0.95) translateY(4px); filter: brightness(0.8); }
    .sprite-placeholder.emotion-gasps { transform: scale(1.1); }
    .sprite-placeholder.emotion-whispers { transform: scale(0.92); filter: brightness(0.75); }
    .sprite-placeholder.emotion-stunned { transform: scale(1.05); filter: brightness(0.95); }
    .sprite-placeholder.emotion-waving { transform: scale(1.05) rotate(2deg); }
    .sprite-placeholder.emotion-thinking { transform: scale(0.97); }
    .sprite-placeholder.emotion-crying { transform: scale(0.93); filter: drop-shadow(0 0 10px rgba(96,165,250,0.4)) brightness(0.85); }
    .sprite-label {
      position: absolute;
      bottom: 8px; right: 12px;
      font-size: 11px;
      color: #6d5fa0;
      background: rgba(0,0,0,0.3);
      padding: 2px 8px;
      border-radius: 10px;
      text-transform: lowercase;
      letter-spacing: 0.5px;
    }
    .bb-header {
      background: rgba(255,255,255,0.06);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }
    .bb-avatar {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, #c084fc, #818cf8);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
      border: 2px solid rgba(192,132,252,0.5);
      flex-shrink: 0;
      transition: box-shadow 0.3s, transform 0.3s;
    }
    .bb-avatar.speaking {
      box-shadow: 0 0 0 6px rgba(192,132,252,0.25), 0 0 20px rgba(192,132,252,0.5);
      animation: avatarPulse 0.6s ease-in-out infinite;
    }
    .bb-avatar.generating {
      animation: avatarSpin 1s linear infinite;
    }
    @keyframes avatarPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.06); }
    }
    @keyframes avatarSpin {
      0% { filter: hue-rotate(0deg); }
      100% { filter: hue-rotate(30deg); }
    }
    .bb-name { color: #e9d5ff; font-weight: 900; font-size: 16px; line-height: 1.2; }
    .bb-status { color: #a78bfa; font-size: 12px; margin-top: 2px; }
    .online-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #a78bfa;
      display: inline-block;
      margin-right: 5px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{ opacity:1; } 50%{ opacity:0.4; } }

    /* ── Messages ── */
    .bb-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .bb-messages::-webkit-scrollbar { width: 4px; }
    .bb-messages::-webkit-scrollbar-thumb { background: rgba(167,139,250,0.25); border-radius: 2px; }

    .msg { display: flex; flex-direction: column; max-width: 80%; animation: popIn 0.2s ease; }
    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.berry { align-self: flex-start; align-items: flex-start; }
    @keyframes popIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

    .bubble {
      padding: 11px 16px;
      border-radius: 20px;
      font-size: 14px;
      line-height: 1.6;
    }
    .msg.user .bubble {
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      color: #fff;
      border-bottom-right-radius: 5px;
    }
    .msg.berry .bubble {
      background: rgba(255,255,255,0.09);
      color: #e9d5ff;
      border-bottom-left-radius: 5px;
      border: 1px solid rgba(192,132,252,0.18);
    }
    .msg-label { font-size: 11px; color: #5b4a7a; margin: 3px 5px 0; }

    .replay-btn {
      background: rgba(192,132,252,0.25);
      border: 1px solid rgba(192,132,252,0.5);
      border-radius: 20px;
      padding: 5px 12px;
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      color: #e9d5ff;
      cursor: pointer;
      margin-top: 6px;
      transition: background 0.15s, transform 0.15s;
      align-self: flex-start;
    }
    .replay-btn:hover { background: rgba(192,132,252,0.45); }
    .replay-btn:active { transform: scale(0.95); }

    /* ── Typing indicator ── */
    .typing-bubble {
      background: rgba(255,255,255,0.09);
      border: 1px solid rgba(192,132,252,0.18);
      border-radius: 20px; border-bottom-left-radius: 5px;
      padding: 13px 18px;
      display: flex; gap: 5px; align-items: center;
      align-self: flex-start;
      animation: popIn 0.2s ease;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #a78bfa;
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100%{ transform:translateY(0); } 30%{ transform:translateY(-6px); } }

    /* ── Suggestions ── */
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      padding: 0 16px 12px;
      flex-shrink: 0;
    }
    .sug-btn {
      background: rgba(124,58,237,0.18);
      border: 1px solid rgba(192,132,252,0.28);
      border-radius: 20px;
      color: #c084fc;
      font-family: 'Nunito', sans-serif;
      font-size: 12px; font-weight: 700;
      padding: 6px 14px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .sug-btn:hover { background: rgba(124,58,237,0.38); transform: scale(1.03); }

    /* ── Error ── */
    .err-bar {
      color: #fca5a5;
      font-size: 12px;
      padding: 6px 16px;
      background: rgba(239,68,68,0.1);
      border-top: 1px solid rgba(239,68,68,0.2);
      display: none;
      flex-shrink: 0;
    }

    /* ── Input area ── */
    .bb-input-area {
      padding: 14px 16px;
      border-top: 1px solid rgba(255,255,255,0.07);
      background: rgba(0,0,0,0.25);
      display: flex;
      gap: 10px;
      align-items: center;
      flex-shrink: 0;
    }
    #bb-input {
      flex: 1;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(192,132,252,0.22);
      border-radius: 26px;
      padding: 11px 18px;
      color: #e9d5ff;
      font-family: 'Nunito', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    #bb-input::placeholder { color: #5b4a7a; }
    #bb-input:focus { border-color: rgba(192,132,252,0.55); }
    #bb-send {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      border: none; cursor: pointer;
      color: white; font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.15s, opacity 0.15s;
      flex-shrink: 0;
      box-shadow: 0 4px 15px rgba(124,58,237,0.4);
    }
    #bb-send:hover { transform: scale(1.08); }
    #bb-send:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

    #bb-attach {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: rgba(192,132,252,0.15);
      border: 1px solid rgba(192,132,252,0.3);
      cursor: pointer;
      font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, transform 0.1s;
      flex-shrink: 0;
    }
    #bb-attach:hover { background: rgba(192,132,252,0.3); transform: scale(1.05); }

    .img-preview-bar {
      padding: 8px 16px;
      background: rgba(0,0,0,0.25);
      border-top: 1px solid rgba(255,255,255,0.07);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .img-preview-bar img {
      width: 36px; height: 36px;
      border-radius: 8px;
      object-fit: cover;
      border: 1px solid rgba(192,132,252,0.3);
    }
    .img-preview-bar span {
      color: #c084fc;
      font-size: 12px;
      flex: 1;
    }
    #img-preview-remove {
      background: rgba(239,68,68,0.2);
      border: 1px solid rgba(239,68,68,0.4);
      border-radius: 50%;
      width: 22px; height: 22px;
      color: #fca5a5;
      cursor: pointer;
      font-size: 11px;
      display: flex; align-items: center; justify-content: center;
    }
    #img-preview-remove:hover { background: rgba(239,68,68,0.35); }

    .msg img.attached-img {
      max-width: 160px;
      border-radius: 14px;
      margin-bottom: 6px;
      display: block;
    }

    /* ── Branding ── */
    .branding {
      text-align: center;
      padding: 8px;
      color: #3d2a5a;
      font-size: 11px;
      flex-shrink: 0;
    }
  </style>
</head>

  // iOS requires AudioContext to be created/resumed inside a user gesture
  // We create it on first tap and keep it alive for the session
  window._audioCtx = null;
  const unlockAudio = () => {
    if (window._audioCtx) return;
    try {
      window._audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      // Play a silent buffer to fully unlock
      const buf = window._audioCtx.createBuffer(1, 1, 22050);
      const src = window._audioCtx.createBufferSource();
      src.buffer = buf;
      src.connect(window._audioCtx.destination);
      src.start(0);
      window._audioCtx.resume();
    } catch(e) {}
    document.removeEventListener('touchstart', unlockAudio);
    document.removeEventListener('click', unlockAudio);
  };
  document.addEventListener('touchstart', unlockAudio, { passive: true });
  document.addEventListener('click', unlockAudio);
});

// Parse text like "[panicking] FOO [quietly] bar" into segments:
// [{ emotion: 'panicking', text: 'FOO ' }, { emotion: 'quietly', text: 'bar' }]
function parseEmotionSegments(text) {
  const segments = [];
  const regex = /\[([a-zA-Z]+)\]/g;
  let lastIndex = 0;
  let lastEmotion = 'idle';
  let match;

  while ((match = regex.exec(text)) !== null) {
    // text before this tag belongs to the previous emotion
    const chunk = text.slice(lastIndex, match.index);
    if (chunk.trim().length > 0) {
      segments.push({ emotion: lastEmotion, text: chunk });
    }
    lastEmotion = match[1].toLowerCase();
    lastIndex = regex.lastIndex;
  }
  // remaining text after the last tag
  const finalChunk = text.slice(lastIndex);
  if (finalChunk.trim().length > 0 || segments.length === 0) {
    segments.push({ emotion: lastEmotion, text: finalChunk });
  }

  // Fallback: if Claude didn't include any tags at all, split the text into
  // sentence-based beats and assign varied emotions so it doesn't feel static
  const hasAnyTag = segments.some(s => s.emotion !== 'idle');
  if (!hasAnyTag) {
    const fallbackEmotions = ['panicking', 'panicking', 'panicking', 'screams', 'screams', 'nervous', 'fail', 'stunned', 'thinking', 'quietly'];
    const rawText = segments.map(s => s.text).join('');
    const sentences = rawText.match(/[^.!?]+[.!?]*/g) || [rawText];

    const newSegments = sentences
      .filter(s => s.trim().length > 0)
      .map(s => ({
        emotion: fallbackEmotions[Math.floor(Math.random() * fallbackEmotions.length)],
        text: s
      }));

    return newSegments.length > 0 ? newSegments : segments;
  }

  return segments;
}

function setSprite(emotion) {
  const map = SPRITE_MAP[emotion] || SPRITE_MAP.default;
  const img = document.getElementById('sprite-img');
  const placeholder = document.getElementById('sprite-placeholder');
  const label = document.getElementById('sprite-label');
  const area = document.getElementById('sprite-area');

  placeholder.className = 'sprite-placeholder';

  // pick a random variant if available, otherwise use img
  const src = map.variants
    ? map.variants[Math.floor(Math.random() * map.variants.length)]
    : map.img;

  // set background color and shake based on emotion
  const panicEmotions = ['panicking', 'screams'];
  const isPanic = panicEmotions.includes(emotion);
  area.style.background = isPanic ? '#f5545a' : '#f5efe6';
  if (isPanic) {
    img.classList.add('shaking');
    playPanicSFX();
  } else {
    img.classList.remove('shaking');
  }

  if (src) {
    img.onerror = () => {
      img.style.display = 'none';
      placeholder.style.display = 'block';
      placeholder.textContent = map.emoji;
      placeholder.classList.add('emotion-' + emotion);
    };
    img.src = src;
    img.style.display = 'block';
    placeholder.style.display = 'none';
  } else {
    img.style.display = 'none';
    placeholder.style.display = 'block';
    placeholder.textContent = map.emoji;
    placeholder.classList.add('emotion-' + emotion);
  }

  label.textContent = emotion;
}

// Schedule sprite changes proportionally across the audio's duration
const PANIC_EMOTIONS = ['panicking', 'screams'];

function scheduleSpriteSequence(segments, durationSeconds) {
  // clear any previously scheduled swaps
  spriteTimers.forEach(t => clearTimeout(t));
  spriteTimers = [];

  const totalChars = segments.reduce((sum, s) => sum + s.text.length, 0) || 1;
  let elapsed = 0;

  segments.forEach((seg, i) => {
    const proportion = seg.text.length / totalChars;
    const segDuration = proportion * durationSeconds;
    const startTime = elapsed;
    const endTime = elapsed + segDuration;
    const isPanic = PANIC_EMOTIONS.includes(seg.emotion);

    if (isPanic) {
      // Randomly cycle through panic variants — random interval between 0.6s and 1.4s
      let cycleTime = startTime;
      while (cycleTime < endTime) {
        const t = cycleTime;
        const timer = setTimeout(() => {
          setSprite(seg.emotion);
        }, t * 1000);
        spriteTimers.push(timer);
        // random gap between 1s and 4s
        cycleTime += 1.0 + Math.random() * 3.0;
      }
    } else {
      // Non-panic: just set once at start of segment
      const timer = setTimeout(() => {
        setSprite(seg.emotion);
      }, startTime * 1000);
      spriteTimers.push(timer);
    }

    elapsed += segDuration;
  });
}

function resetSpriteToIdle() {
  spriteTimers.forEach(t => clearTimeout(t));
  spriteTimers = [];
  setSprite('idle');
}

const audioCache = new Map(); // text -> object URL of cached audio blob

async function speak(text) {
  const segments = parseEmotionSegments(text);

  if (!serverUrl) {
    if (segments.length > 0) setSprite(segments[0].emotion);
    return;
  }

  const statusEl = document.getElementById('bb-status');
  const avatarEl = document.getElementById('bb-avatar');
  const originalStatus = statusEl.textContent;

  // If we've already generated audio for this exact text, reuse it instantly
  if (audioCache.has(text)) {
    const cachedUrl = audioCache.get(text);
    const audio = new Audio(cachedUrl);

    audio.addEventListener('loadedmetadata', () => {
      scheduleSpriteSequence(segments, audio.duration);
    });
    audio.addEventListener('play', () => {
    document.getElementById('sprite-loader').classList.remove('visible');
    const simg = document.getElementById('sprite-img');
    if (simg) simg.classList.remove('loading');
    document.getElementById('sprite-placeholder').style.filter = '';
      statusEl.textContent = '\ud83d\udd0a speaking... (replay)';
      avatarEl.classList.add('speaking');
    });
    audio.addEventListener('ended', () => {
      statusEl.textContent = originalStatus;
      avatarEl.classList.remove('speaking');
      resetSpriteToIdle();
    });
    audio.addEventListener('error', () => {
      statusEl.textContent = originalStatus;
      avatarEl.classList.remove('speaking');
      resetSpriteToIdle();
      audioCache.delete(text);
    });

    // Resume AudioContext first (required on iOS)
    if (window._audioCtx && window._audioCtx.state === 'suspended') {
      window._audioCtx.resume();
    }
    audio.play().catch(() => {
      // autoplay blocked — user can tap replay button
      statusEl.textContent = originalStatus;
      avatarEl.classList.remove('speaking');
    });
    return;
  }

  statusEl.textContent = '\ud83c\udf99\ufe0f generating voice...';
  avatarEl.classList.add('generating');
    document.getElementById('sprite-loader').classList.add('visible');
    document.getElementById('loader-text').textContent = 'generating voice...';
    const simg = document.getElementById('sprite-img');
    if (simg) simg.classList.add('loading');
    document.getElementById('sprite-placeholder').style.filter = 'blur(4px) brightness(0.7)';

  try {
    if (!serverUrl) { showErr('Set your server URL above and hit Save first!'); return; }
    const res = await fetch(`${serverUrl}/voice`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text })
    });

    avatarEl.classList.remove('generating');

    if (!res.ok) {
      const j = await res.json().catch(() => ({}));
      showErr('Voice error: ' + (j?.detail?.message || res.status));
      statusEl.textContent = originalStatus;
      if (segments.length > 0) setSprite(segments[0].emotion);
      return;
    }

    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    audioCache.set(text, url); // cache for instant replay later

    const audio = new Audio(url);

    audio.addEventListener('loadedmetadata', () => {
      scheduleSpriteSequence(segments, audio.duration);
    });

    audio.addEventListener('play', () => {
    document.getElementById('sprite-loader').classList.remove('visible');
    const simg = document.getElementById('sprite-img');
    if (simg) simg.classList.remove('loading');
    document.getElementById('sprite-placeholder').style.filter = '';
      statusEl.textContent = '\ud83d\udd0a speaking...';
      avatarEl.classList.add('speaking');
    });
    audio.addEventListener('ended', () => {
      statusEl.textContent = originalStatus;
      avatarEl.classList.remove('speaking');
      resetSpriteToIdle();
    });
    audio.addEventListener('error', () => {
      statusEl.textContent = originalStatus;
      avatarEl.classList.remove('speaking');
      resetSpriteToIdle();
    });

    // Resume AudioContext first (required on iOS)
    if (window._audioCtx && window._audioCtx.state === 'suspended') {
      window._audioCtx.resume();
    }
    audio.play().catch(() => {
      // autoplay blocked on mobile — audio is cached, tap 🔁 to play
      statusEl.textContent = originalStatus;
      avatarEl.classList.remove('speaking');
    });
  } catch (e) {
    showErr('Voice failed: ' + e.message);
    statusEl.textContent = originalStatus;
    avatarEl.classList.remove('generating', 'speaking');
    document.getElementById('sprite-loader').classList.remove('visible');
    const simg = document.getElementById('sprite-img');
    if (simg) simg.classList.remove('loading');
    document.getElementById('sprite-placeholder').style.filter = '';
    if (segments.length > 0) setSprite(segments[0].emotion);
  }
}

async function sendMessage() {
  const input = document.getElementById('bb-input');
  const text = input.value.trim();
  if (!text && !pendingImage) return;

  if (!serverUrl) {
    showErr('Set your server URL above and hit Save first!');
    return;
  }

  const imageToSend = pendingImage;
  pendingImage = null;
  document.getElementById('bb-image-input').value = '';
  document.getElementById('img-preview-bar').style.display = 'none';

  input.value = '';
  document.getElementById('bb-send').disabled = true;
  document.getElementById('suggestions').style.display = 'none';
  hideErr();
  document.getElementById('bb-status').textContent = 'typing...';

  appendMsg('user', text || '(sent a photo)', null, imageToSend ? imageToSend.dataUrl : null);

  // Build the message content — multimodal if there's an image
  let userContent;
  if (imageToSend) {
    userContent = [
      {
        type: 'image',
        source: { type: 'base64', media_type: imageToSend.mediaType, data: imageToSend.base64 }
      },
      { type: 'text', text: text || 'what do you think of this?' }
    ];
  } else {
    userContent = text;
  }

  history.push({ role: 'user', content: userContent });

  const typing = addTyping();

  try {
    if (!serverUrl) { showErr('Set your server URL above and hit Save first!'); return; }
    const res = await fetch(`${serverUrl}/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history, system: SYSTEM })
    });

    typing.remove();
    document.getElementById('bb-status').textContent = 'probably doomscrolling rn';

    if (!res.ok) {
      const j = await res.json().catch(() => ({}));
      showErr(j?.error?.message || 'API error ' + res.status);
      history.pop();
    } else {
      const data = await res.json();
      const reply = data.content?.[0]?.text || '...';
      console.log('BerryBlue raw reply:', reply);
      history.push({ role: 'assistant', content: reply });
      const displayText = reply.replace(/\[[^\]]*\]/g, '').replace(/\s+/g, ' ').trim();
      appendMsg('berry', displayText, reply);
      speak(reply);
    }
  } catch (e) {
    typing.remove();
    document.getElementById('bb-status').textContent = 'probably doomscrolling rn';
    showErr('Error: ' + e.name + ' — ' + e.message);
  }

  document.getElementById('bb-send').disabled = false;
  input.focus();
}

function sendSug(btn) {
  document.getElementById('bb-input').value = btn.textContent;
  sendMessage();
}

function appendMsg(role, text, rawText, imageDataUrl) {
  const box = document.getElementById('bb-messages');
  const d = document.createElement('div');
  d.className = 'msg ' + role;

  const imgHtml = imageDataUrl ? `<img src="${imageDataUrl}" class="attached-img" />` : '';

  if (role === 'berry' && rawText) {
    d.innerHTML = `<div class="bubble">${imgHtml}${esc(text)}</div><button class="replay-btn" title="Replay voice">🔊 replay</button><div class="msg-label">BerryBlue</div>`;
    const btn = d.querySelector('.replay-btn');
    btn.addEventListener('click', () => speak(rawText));
  } else {
    d.innerHTML = `<div class="bubble">${imgHtml}${esc(text)}</div><div class="msg-label">${role === 'berry' ? 'BerryBlue' : 'You'}</div>`;
  }

  box.appendChild(d);
  box.scrollTop = box.scrollHeight;
}

function addTyping() {
  const box = document.getElementById('bb-messages');
  const d = document.createElement('div');
  d.className = 'typing-bubble';
  d.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  box.appendChild(d);
  box.scrollTop = box.scrollHeight;
  return d;
}

function showErr(msg) {
  const el = document.getElementById('err-bar');
  el.textContent = '⚠️ ' + msg;
  el.style.display = 'block';
}

function hideErr() {
  document.getElementById('err-bar').style.display = 'none';
}

function esc(t) {
  return t
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/\n/g, '<br>');
}

document.getElementById('bb-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') sendMessage();
});
</script>
